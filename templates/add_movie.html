<!DOCTYPE html>
<html>

<head>

<title>Add Movie</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#141414;color:white">

<div class="container mt-5">

<h2>Add Movie</h2>

<form method="POST">

<input name="title" class="form-control mb-3" placeholder="Movie Title">

<input name="genre" class="form-control mb-3" placeholder="Genre">

<input name="year" class="form-control mb-3" placeholder="Year">

<input name="image_url" class="form-control mb-3" placeholder="Poster URL">

<button class="btn btn-danger">Add Movie</button>

</form>

</div>

</body>

</html>
