<!DOCTYPE html>
<html>

<head>

<title>Movie List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="/">Movie List</a>

<div>

<a class="btn btn-success" href="/add_movie">Add Movie</a>
<a class="btn btn-danger" href="/logout">Logout</a>

</div>

</div>
</nav>

<div class="container mt-4">

<h2>Movie List</h2>

<form method="POST" action="/search" class="mb-3">

<input name="keyword" class="form-control" placeholder="Search movie">

</form>

<table class="table table-bordered">

<tr>
<th>Poster</th>
<th>Movie</th>
<th>Category</th>
<th>Rating</th>
<th>Action</th>
</tr>

{% for m in movies %}

<tr>

<td>
<img src="{{m.image_url}}" width="80">
</td>

<td>{{m.movie_name}}</td>
<td>{{m.category}}</td>
<td>{{m.rating}}</td>

<td>

<a class="btn btn-warning" href="/edit_movie/{{m.id}}">Edit</a>
<a class="btn btn-danger" href="/delete_movie/{{m.id}}">Delete</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
