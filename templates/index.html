<!DOCTYPE html>
<html>

<head>

<title>MovieFlix</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#141414;
color:white;
}

.navbar{
background:black;
}

.movie-card{
transition:0.3s;
}

.movie-card:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<nav class="navbar px-4">

<h3 style="color:#e50914;">MovieFlix</h3>

<div>

{% if session.get("user") %}

<a href="/add_movie" class="btn btn-danger">Add Movie</a>
<a href="/logout" class="btn btn-light">Logout</a>

{% else %}

<a href="/login" class="btn btn-danger">Login</a>
<a href="/register" class="btn btn-light">Register</a>

{% endif %}

</div>

</nav>


<div class="container mt-4">

<h3>Popular Movies</h3>

<div class="row">

{% for movie in movies %}

<div class="col-md-3 mb-4">

<div class="movie-card">

<a href="/movie/{{movie.id}}">

<img src="{{movie.image_url}}" class="img-fluid rounded">

</a>

<p class="mt-2">{{movie.title}}</p>

{% if session.get("user") %}

<a href="/edit_movie/{{movie.id}}" class="btn btn-sm btn-warning">Edit</a>

<a href="/delete_movie/{{movie.id}}" class="btn btn-sm btn-danger">Delete</a>

{% endif %}

</div>

</div>

{% endfor %}

</div>

</div>

</body>

</html>
