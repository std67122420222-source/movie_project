<!DOCTYPE html>
<html>

<head>

<title>Edit Movie</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background:#141414;color:white">

<div class="container mt-5">

<h2>Edit Movie</h2>

<form method="POST">

<input name="title" value="{{movie.title}}" class="form-control mb-3">

<input name="genre" value="{{movie.genre}}" class="form-control mb-3">

<input name="year" value="{{movie.year}}" class="form-control mb-3">

<input name="image_url" value="{{movie.image_url}}" class="form-control mb-3">

<button class="btn btn-danger">Update Movie</button>

</form>

</div>

</body>

</html>
